<!DOCTYPE html>
<html>
<head>
    <title>查看文件</title>
    <style>
        body { font-family: sans-serif; padding: 50px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 { color: #333; margin: 0; }
        .logout-btn {
            padding: 8px 16px;
            background: #dc3545;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #c82333;
        }
        ul { list-style-type: none; padding: 0; }
        li { background: #f4f4f4; margin: 10px 0; padding: 15px; border-radius: 5px; }
        a { text-decoration: none; color: #007BFF; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>查看后台</h1>
        <a href="{{ url_for('logout') }}" class="logout-btn">退出登录</a>
    </div>
    <p>以下是用户上传的所有文件：</p>
    
    <ul>
        {% for file in files %}
            <li>
                <!-- 点击文件名可以直接下载或预览 -->
                <a href="{{ url_for('uploaded_file', filename=file) }}" target="_blank">
                    {{ file }}
                </a>
            </li>
        {% else %}
            <li>目前还没有人上传文件。</li>
        {% endfor %}
    </ul>
    
    <p><a href="{{ url_for('index') }}">← 返回上传页面</a></p>
</body>
</html>
