<!DOCTYPE html>
<html>
<head>
    <title>身份验证</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin: 0 0 20px 0;
            font-size: 24px;
            text-align: center;
        }
        p {
            color: #666;
            text-align: center;
            margin: 0 0 30px 0;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        label {
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="password"] {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            border: 1px solid #fcc;
        }
        .locked {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 身份验证</h1>
        <p>请输入 PIN 码以访问教师管理后台</p>
        
        {% if error %}
        <div class="error {% if locked %}locked{% endif %}">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="post">
            <div>
                <label for="pin">PIN 码</label>
                <input 
                    type="password" 
                    id="pin" 
                    name="pin" 
                    placeholder="请输入 PIN 码" 
                    required 
                    autofocus 
                    autocomplete="off"
                    {% if locked %}disabled{% endif %}
                >
            </div>
            <button type="submit" {% if locked %}disabled{% endif %}>
                验证
            </button>
        </form>
    </div>
</body>
</html>
